<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static\css\quiz-css.css">
    <title>Stress Score Quiz</title>
</head>
<body>
    


    <div class="level">
        <h1 class="stres">Stress Score Quiz</h1>
        <button id="startQuizBtn" class="button">
        <a href="/form-submitted" target="_blank">Take the Quiz</a>
        <button type="button" class="button"
        onclick="window.location.href='/predict'">
        Stress Score
        </button>
      </div>
      
      {% if result %}
        <p>Your stress prediction score is: <strong>{{ result }}</strong></p>
      {% else %}
        <p>No prediction result available.</p>
      {% endif %}

      {% if error %}
      <p style="color:red;"><strong>Error:</strong> {{ error }}</p>
      {% endif %}

      <div class="decorative-circle circle1"></div>
      <div class="decorative-circle circle2"></div>
      <div class="decorative-circle circle3"></div>
</body>
</html>
