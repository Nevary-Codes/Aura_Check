<!DOCTYPE html>
<!-- Created by CodingLab |www.youtube.com/c/CodingLabYT-->
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <title>Aura Check - Login</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Fontawesome CDN -->
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   </head>

<body>
  <div class="container">

    <!-- Flip Checkbox -->
    <input type="checkbox" id="flip">

    <!-- Image Cover -->
    <div class="cover">
      <div class="front">
        <img src="{{ url_for('static', filename='img/girl.jpg') }}" alt="Login Image">
      </div>
      <div class="back">
        <img class="backImg" src="{{ url_for('static', filename='img/boy.jpg') }}" alt="Signup Image">
      </div>
    </div>

    <!-- Forms -->
    <div class="forms">
      <div class="form-content">

        <!-- ================= LOGIN FORM ================= -->
        <div class="login-form">
          <div class="title">Login</div>

          <form method="POST" action="/login">
            <div class="input-boxes">

              <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email"
                       placeholder="Enter your email" required>
              </div>

              <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" name="password"
                       placeholder="Enter your password" required>
              </div>

              <div class="text">
                <a href="#">Forgot password?</a>
              </div>

              <div class="button input-box">
                <input type="submit" value="Submit">
              </div>

              <div class="text sign-up-text">
                Don't have an account?
                <label for="flip">Signup now</label>
              </div>

            </div>
          </form>
        </div>

        <!-- ================= SIGNUP FORM ================= -->
        <div class="signup-form">
          <div class="title">Signup</div>

          <form method="POST" action="/signup">
            <div class="input-boxes">

              <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" name="name"
                       placeholder="Enter your name" required>
              </div>

              <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email"
                       placeholder="Enter your email" required>
              </div>

              <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" name="password"
                       placeholder="Enter your password" required>
              </div>

              <div class="button input-box">
                <input type="submit" value="Submit">
              </div>

              <div class="text sign-up-text">
                Already have an account?
                <label for="flip">Login now</label>
              </div>

            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
